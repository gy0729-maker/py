<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* margin 바깥여백 / padding 내부여백 */
        p{
        margin : 0px;
        padding : 0px;
        background-color: cyan;
        border: 2px solid red;
        }

        #p2{
        margin : 20px;
        /* padding 시계방향(top, right, bottom, left) */
        padding: 10px 20px 30px 40px;
        background-color: yellow;
        border: 2px solid red;
        }
    </style>
</head>
<body>
<p>paragraph</p>
<p id="p2">paragraph 2</p>
</body>
</html>
