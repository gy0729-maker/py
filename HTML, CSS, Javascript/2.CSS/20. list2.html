<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        ol{
        list-style: none;
        text-align: center;
        border-top: 2px solid blue;
        border-bottom: 2px solid blue;
        padding: 10px 0; /*top10, right0, bottom10, left0*/
        }

        ol li{
        display: inline;
        }

        ol li a{
        text-decoration: none;
        color: black;
        }

        ol li a:hover{
        text-decoration: underline;
        background: yellow;
        }
    </style>
</head>
<body>
<ol>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">Projects</a></li>
</ol>
</body>
</html>
