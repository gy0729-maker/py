<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #header {
        background-color: cyan;
        width: 100%;
        height: 200px;
        }
        #nav {
        background-color: blue;
        width: 20%;
        height: 500px;
        float: right;
        }
        #contents {
        background-color: green;
        width: 80%;
        height: 500px;
        float: left;
        }
        #footer {
        background-color: lightgreen;
        width: 100%;
        height: 50px;
        clear: both;
        }
    </style>
</head>
<body>
<div id="header">header</div>
<div id="nav">nav</div>
<div id="contents">content</div>
<div id="footer">footer</div>
</body>
</html>
