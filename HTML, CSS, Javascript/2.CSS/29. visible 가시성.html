<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>visible/가시성</title>
    <style>
        img {
        margin: 10px;
        padding: 5px;
        border: 1px solid black;
        }
        .hide { visibility: hidden; /*"visible"*/ }
    </style>
</head>
<body>
<img src="melon.jpg" width="20%" height="20%">
<img src="watermelon.jpg" width="20%" height="20%" class="hide">
<img src="strawberries.jpg" width="20%" height="20%">
</body>
</html>
