<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        ul.a { list-style-type: none; }
        ul.b { list-style-type: square; }
        ul.c { list-style-type: circle; }
    </style>
</head>
<body>
<ul>
    <li>DB</li>
    <li>Python</li>
    <li>Data</li>
</ul>
<ul class="a">
    <li>DB</li>
    <li>Python</li>
    <li>Data</li>
</ul>
<ul class="b">
    <li>DB</li>
    <li>Python</li>
    <li>Data</li>
</ul>
<ul class="c">
    <li>DB</li>
    <li>Python</li>
    <li>Data</li>
</ul>
</body>
</html>
