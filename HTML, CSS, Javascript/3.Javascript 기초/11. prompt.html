<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
  <script>
    num = prompt("number:", "100");
    sum = 0;
    /* java에서의 for문
    초기값 i; 입력한값이 1보다 크거나 같으면; 1증가 */
    for(i = 1; i <= num; i++) {
    sum += i;
    }
    document.write("sum=" + sum);
  </script>
</head>
<body>

</body>
</html>
