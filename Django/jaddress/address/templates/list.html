<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>address</title>
</head>
<body>
<h2>주소록</h2>
<a href="write">등록</a>
<table border="1">
    <tr>
        <th>번호</th>
        <th>이름</th>
        <th>전화</th>
        <th>이메일</th>
        <th>주소</th>
    </tr>
    {% for row in items %}
    <tr>
        <td><a href="detail?idx={{row.idx}}">{{row.idx}}</a></td>
        <td>{{row.name}}</td>
        <td>{{row.tel}}</td>
        <td>{{row.email}}</td>
        <td>{{row.address}}</td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
