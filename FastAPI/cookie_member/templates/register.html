<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<h2>회원가입</h2>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

<form action="/register" method="post">
    <input type="text" name="userid" placeholder="아이디" required><br><br>
    <input type="password" name="password" placeholder="비밀번호" required><br><br>
    <input type="text" name="username" placeholder="이름" required><br><br>
    <button type="submit">가입하기</button>
</form>

<br>
<a href="/">로그인으로 돌아가기</a>
</body>
</html>
