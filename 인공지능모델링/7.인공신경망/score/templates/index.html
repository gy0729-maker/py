<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>수강생 정보 입력</h2>

<form method = "post" action="/predict">
    공부 시간(시간):
    <input type="number" name="study_hours" step="0.1" required>
    <br>
    출석률(%):
    <input type="number" name="attendance_rate" required>
    <br>
    과제 점수:
    <input type="number" name="assignment_score" required>
    <br>
    <button type="submit">예측하기</button>
</form>
</body>
</html>
