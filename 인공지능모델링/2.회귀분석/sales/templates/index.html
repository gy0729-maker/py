<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ads Sales Predictor</title>
</head>
<body>
    <h2>매출 예측</h2>

    <form action="/predict" method="post">
        TV 광고비 : <input type="number" name="tv" step="0.1" required>
        <br><br>

        라디오 광고비 : <input type="number" name="radio" step="0.1" required>
        <br><br>

        SNS 광고비 : <input type="number" name="sns" step="0.1" required>
        <br><br>

        <button type="submit">예측하기</button>
    </form>
</body>
</html>
